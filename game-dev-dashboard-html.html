const getStampComment = (count) => {
  if (count === 0) return "今月のスタンプはゼロです。記録的な成果ですね。";
  if (count <= 3) return `${count}回です。月に${count}回。あなたのゲームは月に${count}回だけ存在しています。`;
  if (count <= 7) return `${count}回です。週に2回未満。悪くはありません。悪くはありませんが、特によくもありません。`;
  if (count <= 14) return `${count}回です。隔日ペース。あなたにしては異常に真剣です。何かあったのでしょうか。`;
  if (count <= 21) return `${count}回です。これは本物の習慣の萌芽かもしれません。驚いています。`;
  return `${count}回です。今月はどうかしています。このまま完成させてしまってください。`;
};
